<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>상품 정보</title>

<style>
body { font-family: Arial; padding:16px; }
h2 { margin-bottom:20px; }

.card {
  border:1px solid #ddd;
  padding:16px;
  margin-bottom:20px;
  border-radius:10px;
}

.label {
  font-weight:bold;
  margin-top:8px;
}

img { max-width:100%; border-radius:8px; }

.video-wrap {
  position:relative;
  width:100%;
  padding-top:56.25%;
  margin-top:10px;
}
.video-wrap iframe {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
}
</style>
</head>
<body>

<div id="content">불러오는 중...</div>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

fetch("https://script.google.com/macros/s/AKfycbziSaUzTfCBwmWedztDd7pz84Z0B21QF9QUS6_NzwSFIE-b9g4_jQ1TzacMTNEDhAPD/exec?key=" + key)
  .then(res => res.json())
  .then(d => {

    if (d.error) {
      document.getElementById("content").innerText = d.error;
      return;
    }

    if (d.category === "식품") {
      renderFood(d);
    }

    else if (d.category === "패션") {
      renderFashion(d);
    }

    else {
      renderDefault(d);
    }
  });

/* --------------------------
   식품 전용 화면
-------------------------- */
function renderFood(d) {
  document.getElementById("content").innerHTML = `
    <h2>${d.name}</h2>

    <div class="card">
      <img src="${d.imageUrl}">
    </div>

    <div class="card">
      <div class="label">제조국</div>${d.country}
      <div class="label">제조원</div>${d.manufacturer}
      <div class="label">판매원</div>${d.seller}
      <div class="label">원재료</div>${d.ingredients || "-"}
      <div class="label">영양성분</div>${d.nutrition || "-"}
      <div class="label">알레르기 정보</div>${d.allergy || "-"}
    </div>

    ${d.reportUrl ? `<div class="card">
      <a href="${d.reportUrl}" target="_blank">시험성적서 보기</a>
    </div>` : ""}
  `;
}

/* --------------------------
   패션 전용 화면
-------------------------- */
function renderFashion(d) {
  document.getElementById("content").innerHTML = `
    <h2>${d.name}</h2>

    <div class="card">
      <img src="${d.imageUrl || ''}">
    </div>

    <div class="card">
      <div class="label">제조국</div>${d.country || "-"}
      <div class="label">제조원</div>${d.manufacturer || "-"}
      <div class="label">판매원</div>${d.seller || "-"}

      <div class="label">혼용률</div>${d.mixRatio || "-"}
      <div class="label">수입원</div>${d.importer || "-"}
      <div class="label">제조년월</div>${d.manufactureDate || "-"}
      <div class="label">세탁방법</div>${d.washingMethod || "-"}
      <div class="label">상품특징</div>${d.feature || "-"}
    </div>

    ${d.videoUrl ? `
    <div class="card">
      <div class="video-wrap">
        <iframe
          src="${d.videoUrl.replace("watch?v=","embed/")}"
          allowfullscreen>
        </iframe>
      </div>
    </div>` : ""}
  `;
}

/* --------------------------
   기본 화면
-------------------------- */
function renderDefault(d) {
  document.getElementById("content").innerHTML =
    "<h2>" + d.name + "</h2>";
}
</script>

</body>
</html>
